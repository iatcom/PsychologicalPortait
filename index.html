<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Experimental Core Spectrum Profile</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #475569; /* Neutral Slate Primary */
            --border-color: #334155;
            --accent-bg: #0f172a;
            --tooltip-bg: #020617;
            --neutral-green: #10b981; /* Emerald green marker */
            --neutral-gray: #64748b;  /* Calibrated Slate Gray */
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .quiz-container {
            max-width: 100%;
            width: 100%;
            background: var(--card-bg);
            padding: 20px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }
        h1 { text-align: center; color: #ffffff; margin-top: 5px; font-size: 1.5rem; letter-spacing: -0.5px; }
        .disclaimer {
            background-color: #1e293b;
            color: #94a3b8;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            line-height: 1.4;
        }
        .question-block {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .question-text {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 14px;
            color: #e2e8f0;
            line-height: 1.4;
        }
        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        input[type="range"] {
            width: 100%;
            height: 44px;
            margin: 8px 0;
            cursor: pointer;
            background: transparent;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: #334155;
            border-radius: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--neutral-green);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .slider-labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            padding: 0 4px;
        }
        .current-value {
            font-weight: 700;
            color: var(--neutral-green);
            font-size: 1.2rem;
            background: var(--accent-bg);
            padding: 4px 14px;
            border-radius: 12px;
            min-width: 50px;
            text-align: center;
        }
        button {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--neutral-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        button:active { transform: scale(0.98); }
        
        .results { display: none; }
        
        .type-verdict-box {
            background: linear-gradient(135deg, #0f172a, #334155);
            color: white;
            padding: 24px 16px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        .role-title {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neutral-green);
        }
        .type-code {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin: 8px 0;
            color: #ffffff;
        }
        .type-description {
            font-size: 0.95rem;
            opacity: 0.95;
            line-height: 1.5;
            margin-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 12px;
            text-align: left;
        }
